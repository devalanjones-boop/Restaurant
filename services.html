<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Burger House</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Navigation bar -->

    <nav class="navbar">
      <div class="logo">🍔 Burger House</div>

      <div class="menu-toggle" onclick="toggleMenu()">☰</div>

      <div class="menu" id="menu">
        <a href="index.html">Home</a>
        <a href="services.html">Menu</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
    </nav>

    <section class="section">
      <h1>Our Menu</h1>

      <div class="grid">
        <div class="card">
          <img
            src="https://media.istockphoto.com/id/1134266170/photo/perfect-burger-with-beef-cutlet-mushrooms-lettuce-isolated-at-black-background.webp?a=1&b=1&s=612x612&w=0&k=20&c=SZKzuqF6EBUJSnwCJ_O2t2a1zVzNl9htaSzN1EttYhc="
            alt="classic-burger"
          />
          🍔 Classic Burger
        </div>
        <div class="card">
          <img
            src="https://images.unsplash.com/photo-1586190848861-99aa4a171e90?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8Y2xhc3NpYyUyMGJ1cmdlcnxlbnwwfHwwfHx8MA%3D%3D"
            alt="cheese-burger"
          />

        </div>
        <div class="card">
          <img
            src="https://media.istockphoto.com/id/1405216633/photo/loaded-cheese-fries-served-in-a-box-isolated-on-wooden-board-top-view-on-black-background.webp?a=1&b=1&s=612x612&w=0&k=20&c=gw6WwknOjTakyuTSyCKpvMrbvxkT2Ye4UHcDmAQf8dI="
            alt="loaded-fries"
          />
          🍟 Loaded Fries
        </div>
      </div>

    <!-- Footer -->

        <h3>🍔 Burger House</h3>
        <p>Serving fresh and delicious burgers every day!</p>

        <p class="copyright">© 2026 Burger House. All rights reserved.</p>
      </div>
    </footer>

    <script>
      function toggleMenu() {
        document.getElementById("menu").classList.toggle("active");
      }
    </script>
  </body>
</html>
